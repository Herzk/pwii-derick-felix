<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        @font-face {
            font-family: 'Nunito';
            src: url('./font/Nunito-Bold.ttf') format('truetype');
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #ffffff;
            font-family: 'Nunito';
        }
        .calculadora {
            text-align: center;
            background-color: #7a7a7a;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 0 2px rgb(255, 255, 255), 0.3em 0.3em 1em rgba(0, 0, 0, 0.6);
        }
        .display {
            margin-bottom: 10px;
        }
        .botoes {
            display: inline-block;
            margin: 5px;
        }
        input[type="button"] {
            width: 50px;
            height: 50px;
            font-size: 18px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: #4a4a4a;
            color: white;
            cursor: pointer;
        }
        input[type="text"] {
            width: 250px;
            height: 50px;
            font-size: 32px;
            margin: 0px;
            border: none;
            border-radius: 5px;
            background-color: #4a4a4a;
            color: white;
            cursor: pointer;
        }
        h1 {
            color: white;
            font-size: 36px;
            margin: 0;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="calculadora">
        <h1>Calculadora</h1>
        <div class="display">
            <input type="text" id="display" disabled>
        </div>
        <br>
        <div class="botoes">
            <input type="button" value="AC" onclick="limpa()">
            <input type="button" value="&#8592" onclick="deletar()">
        </div>
        <br>
        <div class="botoes">
            <input type="button" value="7" onclick="apareceNoDisplay('7')">
            <input type="button" value="8" onclick="apareceNoDisplay('8')">
            <input type="button" value="9" onclick="apareceNoDisplay('9')">
            <input type="button" value="/" onclick="apareceNoDisplay('/')">
        </div>
        <br>
        <div class="botoes">
            <input type="button" value="4" onclick="apareceNoDisplay('4')">
            <input type="button" value="5" onclick="apareceNoDisplay('5')">
            <input type="button" value="6" onclick="apareceNoDisplay('6')">
            <input type="button" value="-" onclick="apareceNoDisplay('-')">
        </div>
        <br>
        <div class="botoes">
            <input type="button" value="3" onclick="apareceNoDisplay('3')">
            <input type="button" value="2" onclick="apareceNoDisplay('2')">
            <input type="button" value="1" onclick="apareceNoDisplay('1')">
            <input type="button" value="+" onclick="apareceNoDisplay('+')">
        </div>
        <br>
        <div class="botoes">
            <input type="button" value="0" onclick="apareceNoDisplay('0')">
            <input type="button" value="," onclick="apareceNoDisplay(',')">
            <input type="button" value="=" onclick="calcula()">
            <input type="button" value="*" onclick="apareceNoDisplay('*')">
        </div>
    </div>
    <script>
        function apareceNoDisplay(value) {
            const display = document.getElementById('display');
            if (value === 'AC') {
                display.value = '';
            } else {
                display.value += value;
            }
        }

        function limpa() {
            document.getElementById('display').value = '';
        }

        function deletar() {
            const display = document.getElementById('display');
            display.value = display.value.slice(0, -1);
        }

        function calcula() {
            const display = document.getElementById('display');
            try {
                display.value = eval(display.value);
            } catch (error) {
                display.value = 'Error';
            }
        }
    </script>
</body>
</html>
